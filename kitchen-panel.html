<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Urban Tadka — Kitchen Display</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
loadOrdersRealtime();
<script src="script.js"></script>
<style>
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --surface2: #191919;
    --border:   #242424;
    --accent:   #f97316;
    --text:     #f5f5f5;
    --muted:    #666;
    --success:  #22c55e;
    --warning:  #f59e0b;
    --danger:   #ef4444;
    --info:     #3b82f6;
    --sidebar-w: 220px;
    --radius:   14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  html, body { height:100%; font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

  /* ── LOGIN ── */
  #login-screen {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse 80% 60% at 50% 30%, #001208 0%, #0a0a0a 70%);
    z-index:999;
  }
  .login-card {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:44px 40px; width:360px; text-align:center;
    box-shadow:0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(34,197,94,.06);
  }
  .login-card .brand { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--success); margin-bottom:6px; }
  .login-card .sub  { color:var(--muted); font-size:13px; margin-bottom:32px; }
  .login-card input {
    width:100%; padding:12px 16px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface2); color:var(--text); font-size:14px; margin-bottom:14px;
    transition:border-color .2s; outline:none;
  }
  .login-card input:focus { border-color:var(--success); }
  .login-card .demo { color:var(--muted); font-size:12px; margin-bottom:20px; }
  .btn-primary {
    width:100%; padding:13px; border-radius:10px; border:none;
    background:linear-gradient(135deg, #16a34a, #14532d);
    color:#fff; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:.03em;
    transition:opacity .2s, transform .2s;
  }
  .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
  .back-link { color:var(--muted); font-size:12px; margin-top:18px; display:block; text-decoration:none; }
  .back-link:hover { color:var(--success); }

  /* ── APP ── */
  #app { display:none; height:100vh; flex-direction:row; }
  #app.visible { display:flex; }

  /* ── SIDEBAR ── */
  .sidebar {
    width:var(--sidebar-w); flex-shrink:0; background:var(--surface);
    border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh;
  }
  .sidebar-logo { padding:24px 22px 20px; border-bottom:1px solid var(--border); }
  .sidebar-logo .name { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:var(--success); letter-spacing:.03em; }
  .sidebar-logo .role { font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
  .sidebar-nav { padding:16px 12px; flex:1; display:flex; flex-direction:column; gap:4px; }
  .nav-item {
    display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px;
    cursor:pointer; font-size:14px; font-weight:500; color:var(--muted);
    transition:all .2s; border:1px solid transparent;
  }
  .nav-item:hover { color:var(--text); background:var(--surface2); }
  .nav-item.active { color:var(--success); background:rgba(34,197,94,.08); border-color:rgba(34,197,94,.15); }
  .nav-icon { font-size:16px; width:20px; text-align:center; }
  .sidebar-footer { padding:16px 12px; border-top:1px solid var(--border); }
  .logout-btn {
    display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px;
    cursor:pointer; font-size:13px; color:var(--muted); transition:all .2s; border:none; background:transparent; width:100%;
  }
  .logout-btn:hover { color:var(--danger); background:rgba(239,68,68,.08); }

  /* ── KDS STATS ── */
  .sidebar-stats { padding:12px; display:flex; flex-direction:column; gap:8px; border-bottom:1px solid var(--border); }
  .kstat {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 12px; border-radius:10px; background:var(--surface2); border:1px solid var(--border);
  }
  .kstat .k-label { font-size:12px; color:var(--muted); }
  .kstat .k-val   { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
  .kstat.preparing .k-val { color:var(--warning); }
  .kstat.ready     .k-val { color:var(--success); }
  .kstat.done      .k-val { color:var(--muted); }

  /* ── MAIN ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

  /* ── TOPBAR ── */
  .topbar {
    padding:18px 28px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-shrink:0;
  }
  .topbar-left h1 { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; }
  .topbar-left p  { color:var(--muted); font-size:13px; margin-top:2px; }
  .notif-btn {
    position:relative; width:42px; height:42px; border-radius:12px;
    background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:18px; transition:all .2s;
  }
  .notif-btn:hover { border-color:#333; }
  .notif-badge {
    position:absolute; top:-4px; right:-4px; width:18px; height:18px; border-radius:50%;
    background:var(--danger); font-size:10px; font-weight:700; color:#fff;
    display:flex; align-items:center; justify-content:center; border:2px solid var(--bg);
  }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .time-chip {
    padding:8px 16px; background:var(--surface); border:1px solid var(--border);
    border-radius:50px; font-size:13px; font-family:'Syne',sans-serif; font-weight:700; color:var(--text);
  }

  /* ── KDS GRID ── */
  .kds-content { flex:1; overflow-y:auto; padding:20px 24px; }
  .kds-content::-webkit-scrollbar { width:5px; }
  .kds-content::-webkit-scrollbar-track { background:transparent; }
  .kds-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .kds-section-hdr { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .kds-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; margin-bottom:28px; }

  /* ORDER CARD */
  .order-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; transition:all .2s ease; position:relative;
  }
  .order-card.new-order { animation:newPulse 1.2s ease 3; }
  @keyframes newPulse {
    0%,100% { box-shadow:0 0 0 0 rgba(59,130,246,.4); border-color:var(--border); }
    50%      { box-shadow:0 0 0 8px rgba(59,130,246,0); border-color:rgba(59,130,246,.6); }
  }
  .order-card.preparing { border-top:3px solid var(--warning); }
  .order-card.ready     { border-top:3px solid var(--success); }
  .order-card.completed { border-top:3px solid var(--muted); opacity:.7; }

  .card-header {
    padding:16px 18px 12px; display:flex; justify-content:space-between; align-items:flex-start;
    border-bottom:1px solid var(--border);
  }
  .table-num { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; line-height:1; }
  .table-num .t-lbl { font-size:11px; color:var(--muted); font-family:'DM Sans',sans-serif; font-weight:400; display:block; margin-bottom:2px; }
  .status-badge {
    padding:5px 12px; border-radius:50px; font-size:11px; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase;
  }
  .status-badge.pending    { background:rgba(59,130,246,.12);  color:var(--info); }
  .status-badge.preparing  { background:rgba(245,158,11,.12); color:var(--warning); }
  .status-badge.ready      { background:rgba(34,197,94,.12);  color:var(--success); }
  .status-badge.completed  { background:rgba(100,100,100,.12); color:var(--muted); }
  .order-time { font-size:11px; color:var(--muted); margin-top:4px; }

  .card-items { padding:14px 18px; }
  .order-item { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--border); }
  .order-item:last-child { border-bottom:none; }
  .oi-name { font-size:13px; font-weight:500; }
  .oi-qty  { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--accent); background:rgba(249,115,22,.1); padding:2px 9px; border-radius:50px; }

  .card-actions { padding:12px 18px 16px; display:flex; gap:8px; }
  .kds-btn {
    flex:1; padding:10px 8px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface2); color:var(--muted); font-family:'Syne',sans-serif;
    font-size:12px; font-weight:700; cursor:pointer; transition:all .18s; letter-spacing:.03em;
    text-transform:uppercase;
  }
  .kds-btn:hover { color:var(--text); border-color:#333; }
  .kds-btn.start    { background:rgba(245,158,11,.1);  color:var(--warning); border-color:rgba(245,158,11,.25); }
  .kds-btn.start:hover { background:rgba(245,158,11,.2); }
  .kds-btn.ready    { background:rgba(34,197,94,.1);   color:var(--success); border-color:rgba(34,197,94,.25); }
  .kds-btn.ready:hover { background:rgba(34,197,94,.2); }
  .kds-btn.complete { background:rgba(100,100,100,.1); color:var(--muted);   border-color:#333; }
  .kds-btn.complete:hover { background:rgba(100,100,100,.2); }

  /* EMPTY */
  .kds-empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .kds-empty .big { font-size:48px; margin-bottom:12px; }
  .kds-empty p { font-size:14px; }

  /* TOAST */
  .toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--success); color:#fff; padding:12px 24px; border-radius:50px;
    font-size:14px; font-weight:600; opacity:0; pointer-events:none;
    transition:all .3s; z-index:9999;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* COMPLETED SECTION */
  .completed-section { margin-top:12px; }

  /* responsive */
  @media (max-width:640px) {
    :root { --sidebar-w:60px; }
    .nav-item span.nav-text, .sidebar-logo .name, .sidebar-logo .role, .logout-btn span.btn-text, .kstat .k-label { display:none; }
    .nav-item { justify-content:center; padding:12px; }
    .kstat { justify-content:center; }
    .topbar { padding:14px 16px; }
    .kds-content { padding:14px; }
    .kds-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">👨‍🍳 Urban Tadka</div>
    <div class="sub">Kitchen Display System</div>
    <input type="text" id="uname" placeholder="Username" value="chef"/>
    <input type="password" id="upass" placeholder="Password" value="kitchen123"/>
    <div class="demo">Demo: chef / kitchen123</div>
    <button class="btn-primary" onclick="doLogin()">Sign In →</button>
    <a href="index.html" class="back-link">← Back to main site</a>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="name">Urban Tadka</div>
      <div class="role">Kitchen Panel</div>
    </div>
    <div class="sidebar-stats">
      <div class="kstat preparing">
        <span class="k-label">Preparing</span>
        <span class="k-val" id="stat-preparing">0</span>
      </div>
      <div class="kstat ready">
        <span class="k-label">Ready</span>
        <span class="k-val" id="stat-ready">0</span>
      </div>
      <div class="kstat done">
        <span class="k-label">Done Today</span>
        <span class="k-val" id="stat-done">0</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active">
        <span class="nav-icon">⊞</span><span class="nav-text">Live Orders</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">
        <span>⏻</span><span class="btn-text">Logout</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <h1>Kitchen Display</h1>
        <p>Live order queue — Urban Tadka</p>
      </div>
      <div class="topbar-right">
        <div class="time-chip" id="clock">--:--</div>
        <div class="notif-btn" id="notif-btn">
          🔔
          <div class="notif-badge" id="notif-count">0</div>
        </div>
        <button onclick="addDemoOrder()" style="padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.03em;transition:all .2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">+ NEW ORDER</button>
      </div>
    </div>

    <!-- KDS -->
    <div class="kds-content" id="kds-content"></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
let orders = [
  { id:'ORD001', table:4, status:'preparing', time:'7:14 PM', items:[{n:'Butter Chicken',q:2},{n:'Garlic Naan',q:4},{n:'Dal Makhani',q:1}] },
  { id:'ORD002', table:7, status:'pending',   time:'7:18 PM', items:[{n:'Paneer Tikka',q:1},{n:'Veg Biryani',q:2}] },
  { id:'ORD003', table:2, status:'ready',     time:'7:05 PM', items:[{n:'Seekh Kebab',q:3},{n:'Butter Naan',q:6}] },
  { id:'ORD004', table:10,status:'preparing', time:'7:22 PM', items:[{n:'Mutton Rogan Josh',q:1},{n:'Mango Lassi',q:2}] },
];
let doneOrders = [];
let doneCount  = 6;
let newOrderCounter = 5;
let newOrderIds = new Set(['ORD002']);

// ── LOGIN ──
function doLogin() {
  const u = document.getElementById('uname').value;
  const p = document.getElementById('upass').value;
  if (u === 'chef' && p === 'kitchen123') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    renderKDS(); updateStats(); startClock();
    // simulate new order coming in after 6s
    setTimeout(addDemoOrder, 6000);
  } else { showToast('Invalid credentials', true); }
}
function doLogout() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
}

// ── CLOCK ──
function startClock() {
  const update = () => {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
  };
  update(); setInterval(update, 1000);
}

// ── STATS ──
function updateStats() {
  const prep  = orders.filter(o => o.status === 'preparing' || o.status === 'pending').length;
  const ready = orders.filter(o => o.status === 'ready').length;
  document.getElementById('stat-preparing').textContent = prep;
  document.getElementById('stat-ready').textContent     = ready;
  document.getElementById('stat-done').textContent      = doneCount;
  document.getElementById('notif-count').textContent    = newOrderIds.size;
}

// ── RENDER ──
function renderKDS() {
  const active    = orders.filter(o => o.status !== 'completed');
  const completed = doneOrders.slice(0, 4);
  const el = document.getElementById('kds-content');

  let html = '';
  if (active.length === 0) {
    html += `<div class="kds-empty"><div class="big">✅</div><p>All orders complete — kitchen clear!</p></div>`;
  } else {
    html += `<div class="kds-section-hdr">Active Orders (${active.length})</div><div class="kds-grid">`;
    active.forEach(o => { html += orderCardHTML(o); });
    html += '</div>';
  }

  if (completed.length) {
    html += `<div class="kds-section-hdr completed-section">Completed Today</div><div class="kds-grid">`;
    completed.forEach(o => { html += orderCardHTML(o); });
    html += '</div>';
  }

  el.innerHTML = html;
  updateStats();
}

function orderCardHTML(o) {
  const isNew = newOrderIds.has(o.id);
  const statusLabel = { pending:'Pending', preparing:'Preparing', ready:'Ready', completed:'Done' };
  let actions = '';
  if (o.status === 'pending')   actions = `<button class="kds-btn start"    onclick="advance('${o.id}','preparing')">▶ Start Preparing</button>`;
  if (o.status === 'preparing') actions = `<button class="kds-btn ready"    onclick="advance('${o.id}','ready')">✓ Mark Ready</button>`;
  if (o.status === 'ready')     actions = `<button class="kds-btn complete" onclick="advance('${o.id}','completed')">✓ Complete</button>`;
  return `
    <div class="order-card ${o.status}${isNew ? ' new-order' : ''}" id="card-${o.id}">
      <div class="card-header">
        <div>
          <div class="table-num"><span class="t-lbl">Table</span>${String(o.table).padStart(2,'0')}</div>
          <div class="order-time">${o.id} · ${o.time}</div>
        </div>
        <div>
          <div class="status-badge ${o.status}">${statusLabel[o.status]}</div>
        </div>
      </div>
      <div class="card-items">
        ${o.items.map(i => `
          <div class="order-item">
            <span class="oi-name">${i.n}</span>
            <span class="oi-qty">×${i.q}</span>
          </div>
        `).join('')}
      </div>
      ${actions ? `<div class="card-actions">${actions}</div>` : ''}
    </div>`;
}

function advance(id, newStatus) {
  const order = orders.find(o => o.id === id);
  if (!order) return;
  order.status = newStatus;
  newOrderIds.delete(id);
  if (newStatus === 'completed') {
    orders = orders.filter(o => o.id !== id);
    doneOrders.unshift(order);
    doneCount++;
    showToast('Table ' + String(order.table).padStart(2,'0') + ' order complete ✓');
  }
  renderKDS();
}

// ── NEW ORDER SIMULATION ──
const DEMO_ITEMS = [
  [{n:'Chicken Malai',q:2},{n:'Butter Naan',q:3}],
  [{n:'Paneer Tikka',q:1},{n:'Dal Makhani',q:2},{n:'Masala Chai',q:2}],
  [{n:'Mutton Rogan Josh',q:1},{n:'Laccha Paratha',q:2}],
  [{n:'Veg Spring Roll',q:3},{n:'Mango Lassi',q:1}],
];
const DEMO_TABLES = [1,3,5,6,8,9,11,12];

function addDemoOrder() {
  const id    = 'ORD00' + ++newOrderCounter;
  const table = DEMO_TABLES[Math.floor(Math.random() * DEMO_TABLES.length)];
  const items = DEMO_ITEMS[Math.floor(Math.random() * DEMO_ITEMS.length)];
  const now   = new Date();
  const time  = now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
  orders.unshift({ id, table, status:'pending', time, items });
  newOrderIds.add(id);
  renderKDS();
  showToast('🔔 New order — Table ' + String(table).padStart(2,'0'));
}

// ── TOAST ──
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#ef4444' : '#22c55e';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
